<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB - File Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #111;
        }

        .header span {
            color: #2563eb;
            font-size: 14px;
            margin-left: auto;
        }

        /* Info Bar */
        .info-bar {
            padding: 12px 16px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #4b5563;
        }

        .info-left {
            display: flex;
            gap: 16px;
        }

        .info-right {
            color: #2563eb;
            font-weight: 500;
        }

        /* File List */
        .file-list {
            padding: 8px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f5f5f5;
        }

        .file-icon {
            width: 32px;
            height: 32px;
            background: #e5e7eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #4b5563;
            font-size: 12px;
            font-weight: 600;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-size: 15px;
            font-weight: 500;
            color: #111;
            margin-bottom: 2px;
        }

        .file-meta {
            font-size: 12px;
            color: #6b7280;
        }

        .file-size {
            font-size: 13px;
            color: #4b5563;
        }

        /* Preview Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 16px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .close-btn {
            font-size: 20px;
            cursor: pointer;
            color: #6b7280;
        }

        .modal-body {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .code-view {
            background: #1e293b;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            margin: 10px 0;
        }

        .download-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        /* Upload Area */
        .upload-area {
            padding: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .upload-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>WEB</h1>
            <span>V2322 > WEB</span>
        </div>

        <!-- Info Bar -->
        <div class="info-bar">
            <div class="info-left">
                <span>File besar</span>
                <span>Minggu ini</span>
            </div>
            <div class="info-right">
                File di WEB
            </div>
        </div>

        <!-- File List -->
        <div class="file-list" id="fileList">
            <!-- Files akan diisi JavaScript -->
        </div>

        <!-- Upload Button -->
        <div class="upload-area">
            <button class="upload-btn" onclick="document.getElementById('fileUpload').click()">
                + Upload File
            </button>
            <input type="file" id="fileUpload" style="display: none;" onchange="handleFileUpload(this)">
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">index.html</h3>
                <span class="close-btn" onclick="closeModal()">×</span>
            </div>
            <div class="modal-body">
                <div class="code-view" id="fileContent"></div>
                <button class="download-btn" onclick="downloadFile()">Download File</button>
            </div>
        </div>
    </div>

    <script>
        // Data files (index.html default)
        let files = [
            {
                name: 'index.html',
                size: '33.29 kB',
                date: '18.49',
                type: 'html',
                content: `<!DOCTYPE html>
<html>
<head>
    <title>X-Stroms Deployer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #0B1A33, #1A2F4A); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: system-ui; }
        .card { background: rgba(10,20,35,0.95); padding: 40px; border-radius: 20px; border: 2px solid #FFD700; max-width: 500px; width: 90%; }
        h1 { color: #FFD700; font-size: 24px; margin-bottom: 20px; }
        .btn { background: #FFD700; color: #0A0F1E; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ X-Stroms Deployer ⚡</h1>
        <p style="color:white; margin-bottom:20px;">Upload ZIP file untuk deploy website static</p>
        <button class="btn" onclick="alert('Demo version')">Choose File</button>
    </div>
</body>
</html>`
            }
        ];

        // Load dari localStorage
        function loadFiles() {
            const saved = localStorage.getItem('web_files');
            if(saved) {
                files = JSON.parse(saved);
            }
            renderFiles();
        }

        // Simpan ke localStorage
        function saveFiles() {
            localStorage.setItem('web_files', JSON.stringify(files));
        }

        // Render file list
        function renderFiles() {
            const list = document.getElementById('fileList');
            let html = '';

            files.forEach((file, index) => {
                html += `
                    <div class="file-item" onclick="previewFile(${index})">
                        <div class="file-icon">📄</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">${file.size} • ${file.date}</div>
                        </div>
                        <div class="file-size">${file.size}</div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // Handle file upload
        function handleFileUpload(input) {
            const file = input.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Baca content
                let content = e.target.result;
                
                // Format size
                let size = (file.size / 1024).toFixed(2) + ' kB';
                
                // Ambil jam sekarang
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const time = `${hours}.${minutes}`;

                // Tambah ke files
                files.push({
                    name: file.name,
                    size: size,
                    date: time,
                    type: file.name.split('.').pop(),
                    content: content
                });

                saveFiles();
                renderFiles();

                // Reset input
                input.value = '';
            };

            if(file.type.startsWith('text/') || file.name.endsWith('.html') || file.name.endsWith('.css') || file.name.endsWith('.js')) {
                reader.readAsText(file);
            } else {
                reader.readAsDataURL(file);
            }
        }

        // Preview file
        function previewFile(index) {
            const file = files[index];
            
            document.getElementById('modalTitle').textContent = file.name;
            
            let displayContent = file.content;
            
            // Kalo binary file, tampilkan pesan
            if(file.content.startsWith('data:')) {
                displayContent = '[Binary file - cannot display]';
            }
            
            document.getElementById('fileContent').textContent = displayContent;
            document.getElementById('previewModal').classList.add('show');
            
            // Simpan index untuk download
            window.currentFileIndex = index;
        }

        // Close modal
        function closeModal() {
            document.getElementById('previewModal').classList.remove('show');
        }

        // Download file
        function downloadFile() {
            const file = files[window.currentFileIndex];
            
            // Buat blob
            let blob;
            if(file.content.startsWith('data:')) {
                // Binary file
                const arr = file.content.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while(n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                blob = new Blob([u8arr], {type: mime});
            } else {
                // Text file
                blob = new Blob([file.content], {type: 'text/plain'});
            }
            
            // Download
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Delete file (opsional)
        function deleteFile(index) {
            if(confirm('Hapus file ini?')) {
                files.splice(index, 1);
                saveFiles();
                renderFiles();
                closeModal();
            }
        }

        // Load files saat startup
        loadFiles();

        // Click outside modal to close
        document.getElementById('previewModal').addEventListener('click', function(e) {
            if(e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
